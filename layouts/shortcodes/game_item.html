{{ $unused := .Inner }}
<div class="game-item">
  <div class="game-image">
    <img src="{{ .Get "image" }}" alt="{{ .Get "alt" | default "Game Icon" }}">
    <div class="game-content">
      <h3>{{ .Get "title" }}</h3>
    </div>
  </div>
  {{ if .Get "androidLink" }}
  <div class="game-download">
    <a href="{{ .Get "androidLink" }}" target="_blank" rel="noopener" class="game-download-link" aria-label="Download {{ .Get "title" }} on Google Play">
      <img src="/images/GetItOnGooglePlay_Badge_Web_color_English.png" alt="Get it on Google Play" class="google-play-badge">
    </a>
  </div>
  {{ end }}
</div>
